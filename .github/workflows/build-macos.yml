name: Build WhatMod macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 playwright pillow pyperclip
          python -m playwright install chromium

      - name: Verify required files exist
        run: |
          echo "Current directory:"
          pwd

          echo "Repo root:"
          ls -la

          echo "Assets folder:"
          ls -la assets || true

          if [ ! -f "whatmod.py" ]; then
            echo "ERROR: whatmod.py is missing from repo root"
            exit 1
          fi

          if [ ! -f "cover.png" ]; then
            echo "ERROR: cover.png is missing from repo root"
            exit 1
          fi

          if [ ! -f "whatmod_license_secret.key" ]; then
            echo "ERROR: whatmod_license_secret.key is missing from repo root"
            exit 1
          fi

          echo "All required files found."

      - name: Build WhatMod macOS app
        run: |
          pyinstaller \
            --windowed \
            --noconfirm \
            --clean \
            --onedir \
            --name "WhatMod" \
            --add-data "cover.png:." \
            --add-data "whatmod_license_secret.key:." \
            --add-data "assets:assets" \
            whatmod.py

      - name: Ad-hoc sign app bundle
        run: |
          codesign --force --deep --sign - dist/WhatMod.app

      - name: Remove quarantine attributes
        run: |
          xattr -cr dist/WhatMod.app || true

      - name: Verify app bundle
        run: |
          test -d dist/WhatMod.app
          test -f dist/WhatMod.app/Contents/MacOS/WhatMod
          ls -la dist/WhatMod.app/Contents/MacOS
          ls -la dist/WhatMod.app/Contents/Resources || true

      - name: Zip app properly for macOS
        run: |
          cd dist
          ditto -c -k --keepParent WhatMod.app WhatMod-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatMod-macOS
          path: dist/WhatMod-macOS.zip
