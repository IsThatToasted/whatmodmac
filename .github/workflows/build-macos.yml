name: Build WhatMod macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 playwright pillow pyperclip
          python -m playwright install chromium

      - name: Build WhatMod app
        run: |
          pyinstaller \
            --windowed \
            --noconfirm \
            --clean \
            --onedir \
            --name "WhatMod" \
            whatmod.py

      - name: Ad-hoc sign WhatMod app
        run: |
          codesign --force --deep --sign - dist/WhatMod.app

      - name: Remove quarantine attributes
        run: |
          xattr -cr dist/WhatMod.app || true

      - name: Verify app bundle
        run: |
          test -d dist/WhatMod.app
          test -f dist/WhatMod.app/Contents/MacOS/WhatMod
          ls -la dist/WhatMod.app/Contents/MacOS

      - name: Zip app correctly for macOS
        run: |
          cd dist
          ditto -c -k --keepParent WhatMod.app WhatMod-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatMod-macOS
          path: dist/WhatMod-macOS.zip
